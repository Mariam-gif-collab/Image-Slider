<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
        <link rel="stylesheet" href="style.css">

</head>

<body>
    <h1 class="text-center my-3">Image Slider</h1>
    <div class="main">
        <div class="sidebar container gallery d-flex  justify-content-center gap-2 p-2">
            <img src="./images/house 1.jpeg" alt="p1" class="galimg" onclick="setImg(this.src)">
            <img src="./images/house 2.jpeg" alt="p2" class="galimg" onclick="setImg(this.src)">
            <img src="./images/house 3.webp" alt="p3" class="galimg" onclick="setImg(this.src)">
            <img src="./images/house 4.jpeg" alt="p4" class="galimg" onclick="setImg(this.src)">
            <img src="./images/house 5.jpg" alt="p5" class="galimg" onclick="setImg(this.src)">
        </div>

        <div class="center container p-5">
            <div class="slider mx-auto" id="slider">
                <div class="prev btn p-2" id="prev" onclick="previous()"><i class="fa-solid fa-less-than"></i></div>
                <img src="./images/house 1.jpeg" id="image" alt="house1" class="image-fluid">
                <div class="next btn p-2" id="next" onclick="next()"><i class="fa-solid fa-greater-than"></i></div>

            </div>
        </div>
    </div>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
            integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
            crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
            integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
            crossorigin="anonymous"></script>
        <script src="index.js"></script>

</body>

</html>
